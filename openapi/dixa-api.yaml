            construct or change programmatically as the internal structure may
            change without notice.
          required: false
          schema:
            type: string
      requestBody:
        description: The filters to apply to the search
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchParametersInput'
            examples:
              Find conversations that include one of two tags:
                value:
                  filters:
                    strategy: All
                    conditions:
                      - field:
                          operator:
                            values:
                              - 177e7564-6434-4177-a25a-8530089196ad
                              - 7729e7564-9876-a637-b46b-8530038196b3
                            _type: IncludesOne
                          _type: TagId
              Find conversations that contain any tags:
                value:
                  query:
                    value: order 12345
                    exactMatch: true
                  filters:
                    strategy: All
                    conditions:
                      - field:
                          operator:
                            _type: IsNotEmpty
                          _type: TagId
              Find conversations that contain all specified tags and contains specific text:
                value:
                  query:
                    value: order 12345
                    exactMatch: true
                  filters:
                    strategy: All
                    conditions:
                      - field:
                          operator:
                            values:
                              - 177e7564-6434-4177-a25a-8530089196ad
                              - 7729e7564-9876-a637-b46b-8530038196b3
                            _type: IncludesAll
                          _type: TagId
              Find conversations with custom attribute of type Text:
                value:
                  query:
                    value: delivery
                    exactMatch: true
                  filters:
                    strategy: All
                    conditions:
                      - field:
                          operator:
                            values:
                              - - PK461926232
                              - - PK461926233
                              - - PK461926234
                            _type: IsOneOf
                          attributeId: 1fba54c0-3ef6-48c8-bf00-912c5c9890fd
                          _type: CustomAttribute
              Find conversations with custom attribute of type Select:
                value:
                  filters:
                    strategy: All
                    conditions:
                      - field:
                          operator:
                            values:
                              - - cookies
                              - - chocolate
                                - chocolate_bar
                                - with_nuts
                                - peanuts
                              - - tart
                                - nut_tart
                                - hazelnuts
                            _type: IsOneOf
                          attributeId: 30cd8aa4-3b58-4d70-a716-887dd6f348b4
                          _type: CustomAttribute
              Find conversations where custom attribute is not set:
                value:
                  filters:
                    strategy: All
                    conditions:
                      - field:
                          operator:
                            _type: IsEmpty
                          attributeId: 1fba54c0-3ef6-48c8-bf00-912c5c9890fd
                          _type: CustomAttribute
              Find conversations with duration between 10 and 20 seconds:
                value:
                  filters:
                    strategy: All
                    conditions:
                      - field:
                          operator:
                            min: 10000
                            max: 20000
