        - authorization
        - customHeaders
      properties:
        name:
          description: The Webhook Subscription name
          type: string
        events:
          description: >-
            The set of events this Webhook Subscription subscribes to. Allowed
            values: [SLAEvaluationVoided, ConversationPending,
            SLAEvaluationBreached, ConversationMessageAdded,
            ConversationCustomAttributeUpdated, SLAEvaluationAchieved,
            ConversationAssigned, ConversationMessageDeliveryDelivered,
            ConversationMessageDeliveryInfo, ConversationTransferred,
            ConversationEnqueued, AgentUnbannedEnduser, TypingStarted,
            ConversationCreated, ConversationUnassigned, ConversationOpen,
            ConversationAbandoned, ConversationClosed,
            ConversationMessageDeliveryFailed, ConversationTagAdded,
            ConversationNoteAdded, AgentBannedEnduser,
            ConversationEndUserReplaced, ConversationMessageDeliverySeen,
            AgentUnbannedIp, ConversationMessageDeliverySent, AgentBannedIp,
            ConversationTagRemoved, ConversationRated, SLAEvaluationPending,
            ConversationMessageDeliverySpamComplaint,
            ConversationPendingExpired]
          type: array
          uniqueItems: true
          items:
            description: >-
              values: [SLAEvaluationVoided, ConversationPending,
              SLAEvaluationBreached, ConversationMessageAdded,
              ConversationCustomAttributeUpdated, SLAEvaluationAchieved,
              ConversationAssigned, ConversationMessageDeliveryDelivered,
              ConversationMessageDeliveryInfo, ConversationTransferred,
              ConversationEnqueued, AgentUnbannedEnduser, TypingStarted,
              ConversationCreated, ConversationUnassigned, ConversationOpen,
              ConversationAbandoned, ConversationClosed,
              ConversationMessageDeliveryFailed, ConversationTagAdded,
              ConversationNoteAdded, AgentBannedEnduser,
              ConversationEndUserReplaced, ConversationMessageDeliverySeen,
              AgentUnbannedIp, ConversationMessageDeliverySent, AgentBannedIp,
              ConversationTagRemoved, ConversationRated, SLAEvaluationPending,
              ConversationMessageDeliverySpamComplaint,
              ConversationPendingExpired]
            type: string
        url:
          description: URL of the server that the webhook request should be sent to
          type: string
        authorization:
          $ref: '#/components/schemas/WebhookAuthorization'
        customHeaders:
          $ref: '#/components/schemas/Map_String'
          description: Custom headers that will be added to the webhook request
        enabled:
          description: >-
            Defines whether this Webhook Subscription is enabled or disabled.
            Default is `true`
          type: boolean
        filters:
          $ref: '#/components/schemas/Map_WebhookEventType_Filters'
          description: >-
            Filters to be applied to the events of the Webhook Subscription,
            only filtered events will be sent out. Filters can target a
            conversation channel, queue...
