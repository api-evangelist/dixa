  /beta/conversations/import:
    post:
      tags:
        - Conversations
        - Chatbots
      summary: Import conversation
      description: >-
        Import a previously created conversation into Dixa. For inbound messages
        the author is assumed to be the requester of the conversation (end
        user), unless the specific channel supports overriding the message
        author through its attributes. For outbound messages the author is
        specified using the agentId field.
      operationId: postConversationsImport
      requestBody:
        description: The type of conversation to import
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericConversationImport'
            examples:
              Generic API messaging conversation example:
                summary: Generic API messaging conversation example
                description: >-
                  The following example demonstrates how to import a
                  conversation for the **genericapimessaging** channel. The key
                  part is setting **genericChannelName** to
                  **genericapimessaging**. This channel does not require any
                  channel-specific **attributes**.
                value:
                  genericChannelName: genericapimessaging
                  requesterId: 9c2a2cce-699f-4a72-89d9-fda5bc8dec8b
                  requesterConnectionStatus: Connected
                  direction: Inbound
                  messages:
                    - content:
                        value: Hi, I need help with my order
                        _type: Text
                      attachments: []
                      createdAt: '2021-12-01T13:00:00.003Z'
                      _type: InboundImport
                    - content:
                        value: Sure — what seems to be the problem?
                        _type: Text
                      agentId: cd4ceb58-bb3a-443c-9cd8-4f088feafe5b
                      attachments: []
                      createdAt: '2021-12-01T14:00:00.004Z'
                      _type: OutboundImport
                  createdAt: '2021-12-01T11:00:00.001Z'
                  assignment:
                    agentId: cd4ceb58-bb3a-443c-9cd8-4f088feafe5b
                    assignedAt: '2021-12-01T12:00:00.002Z'
                  _type: GenericConversationImport
              Email conversation example:
                summary: Email conversation example
                description: >-
                  The following example demonstrates how to import an email
                  conversation. The key parts is the **genericChannelName** and
                  the **attributes** fields. Please note that the **cc**,
                  **bcc** and **requesterId** fields are optional. **cc** and
                  **bcc** are only relevant for outbound messages, while
                  **requesterId** message attribute is only relevant for inbound
                  messages.
                value:
                  genericChannelName: email
                  requesterId: 9c2a2cce-699f-4a72-89d9-fda5bc8dec8b
                  requesterConnectionStatus: Connected
                  direction: Inbound
                  messages:
                    - content:
                        value: My order hasn't shipped
                        _type: Text
                      attachments: []
                      createdAt: '2021-12-01T13:00:00.003Z'
                      attributes:
                        emailIntegrationId: sample-integration@email.dixa.io
                      _type: InboundImport
                    - content:
                        value: Our bad, sorry
                        _type: Text
                      agentId: cd4ceb58-bb3a-443c-9cd8-4f088feafe5b
                      attachments:
                        - url: >-
                            https://en.wikipedia.org/wiki/Shipwreck#/media/File:Titanic_wreck_bow.jpg
                          prettyName: shipwreck
                      createdAt: '2021-12-01T14:00:00.004Z'
                      attributes:
                        emailIntegrationId: sample-integration@email.dixa.io
                        cc:
                          - a@b.com
                          - b@c.com
                        bcc: []
                      _type: OutboundImport
                    - content:
                        value: Thank you!
                        _type: Text
                      attachments: []
                      createdAt: '2021-12-01T15:00:00.005Z'
                      attributes:
                        emailIntegrationId: sample-integration@email.dixa.io
                        requesterId: 4f1f3a86-6b90-411a-9a3b-cf2e4c4cd7cd
                      _type: InboundImport
                  createdAt: '2021-12-01T11:00:00.001Z'
                  assignment:
                    agentId: cd4ceb58-bb3a-443c-9cd8-4f088feafe5b
                    assignedAt: '2021-12-01T12:00:00.002Z'
                  closing:
                    closedAt: '2021-12-01T15:00:00.005Z'
                    closedBy: cd4ceb58-bb3a-443c-9cd8-4f088feafe5b
                  attributes:
                    emailIntegrationId: sample-integration@email.dixa.io
                    subject: email subject
                  _type: GenericConversationImport
        required: true
      responses:
        '201':
          description: The id of the imported conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportConversationOutput'
              example:
                data:
                  id: 100
