openapi: 3.0.3
info:
  title: Dixa API
  version: beta
servers:
  - url: https://dev.dixa.io
paths:
  /beta/analytics/metrics:
    get:
      tags:
        - Analytics
      summary: Metrics Catalogue
      description: >-
        This endpoint lists all available metric IDs that can be used to fetch
        data in Get Metric Data
      operationId: getAnalyticsMetrics
      parameters:
        - name: pageLimit
          in: query
          description: >-
            Maximum number of results per page. May be used in combination with
            pageKey to change the number of results in between page requests.
          required: false
          schema:
            type: integer
            format: int32
        - name: pageKey
          in: query
          description: >-
            Base64 encoded form of pagination query parameters. Do not try to
            construct or change programmatically as the internal structure may
            change without notice.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: The catalogue of metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMetricsOutput'
              example:
                data:
                  - id: csat
                    description: >-
                      (Number of satisfied customers (4 and 5)/ Number of survey
                      responses) x 100 = % of satisfied customers
                    filters:
                      - filterAttribute: agent_id
                        description: Used to filter by the agent_id
                      - filterAttribute: queue_id
                        description: Used to filter by the queue_id
                      - filterAttribute: channel
                        description: Used to filter by the channel
                      - filterAttribute: initial_direction
                        description: Used to filter by the initial_direction
                      - filterAttribute: tag_id
                        description: Used to filter by the tag_id
                      - filterAttribute: contact_point
                        description: Used to filter by the contact_point
                    aggregations:
                      - measure: Percentage
                        description: Calculated Percentage
                    relatedRecordIds:
                      - ratings
                  - id: closed_conversations
                    description: Closed conversation data
                    filters:
                      - filterAttribute: queue_id
                        description: Used to filter by the queue_id
                      - filterAttribute: channel
                        description: Used to filter by the channel
                      - filterAttribute: initial_direction
                        description: Used to filter by the initial_direction
                      - filterAttribute: tag_id
                        description: Used to filter by the tag_id
                      - filterAttribute: contact_point
                        description: Used to filter by the contact_point
                    aggregations:
                      - measure: Count
                        description: Conversation closed count
                    relatedRecordIds:
                      - closed_conversations
        '400':
          description: >-
            Invalid value extracted from request context, Invalid value for:
            query parameter pageLimit, Invalid value for: query parameter
            pageKey
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
              example:
                message: Invalid value in request
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
              example:
                message: >-
                  There was an internal server error while processing the
                  request
    post:
      tags:
        - Analytics
      summary: Get Metric Data
      description: Get data of a specific metric (aggregated)
      operationId: postAnalyticsMetrics
      requestBody:
        description: >-
          The available request filters and aggregations for fetching the metric
          data
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetMetricDataInput'
            examples:
              Example0:
                value:
                  id: closed_conversations
                  periodFilter:
                    value:
                      _type: PreviousWeek
                    _type: Preset
                  filters:
                    - attribute: channel
                      values:
                        - email
                  aggregations:
                    - Count
                  timezone: Europe/Copenhagen
              Example1:
                value:
                  id: closed_conversations
                  csidFilter:
                    - 42
                    - 43
                    - 44
                  filters:
                    - attribute: channel
                      values:
                        - email
                  aggregations:
                    - Count
                  timezone: Europe/Copenhagen
        required: true
      responses:
        '200':
          description: The metric data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMetricDataOutput'
              example:
                data:
                  id: closed_conversations
                  aggregates:
                    - value: 42
                      measure: Count
                      _type: LongAggregateValue
        '400':
          description: >-
            Invalid value extracted from request context, Invalid value for:
            body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
              example:
                message: Invalid value in request
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
              example:
                message: >-
                  There was an internal server error while processing the
                  request
  /beta/analytics/metrics/{metricId}:
    get:
      tags:
        - Analytics
      summary: Metric Description
      description: >-
        This endpoint lists all available properties of a metric to use for
        querying its data
      operationId: getAnalyticsMetricsMetricid
      parameters:
        - name: metricId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The metric properties
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMetricOutput'
              example:
                data:
                  id: csat
                  description: >-
                    (Number of satisfied customers (4 and 5)/ Number of survey
                    responses) x 100 = % of satisfied customers
                  filters:
                    - filterAttribute: agent_id
                      description: Used to filter by the agent_id
                    - filterAttribute: queue_id
                      description: Used to filter by the queue_id
                    - filterAttribute: channel
                      description: Used to filter by the channel
                    - filterAttribute: initial_direction
                      description: Used to filter by the initial_direction
                    - filterAttribute: tag_id
                      description: Used to filter by the tag_id
                    - filterAttribute: contact_point
                      description: Used to filter by the contact_point
                  aggregations:
                    - measure: Percentage
                      description: Calculated Percentage
                  relatedRecordIds:
                    - ratings
        '400':
          description: Invalid value extracted from request context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
              example:
                message: Invalid value in request
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
              example:
                message: >-
                  There was an internal server error while processing the
                  request
  /beta/analytics/filter/{filterAttribute}:
    get:
      tags:
        - Analytics
      summary: Filter values
      description: >-
        Get possible values to be used with a given filter attribute. Filter
        attributes are not metric or record specific, so one filter attribute
        can be used with multiple metrics/records. When a filter value is not
        relevant for a specific metric/record, it is simply ignored.
      operationId: getAnalyticsFilterFilterattribute
      parameters:
        - name: filterAttribute
          in: path
          required: true
          schema:
            type: string
        - name: pageLimit
          in: query
          description: >-
            Maximum number of results per page. May be used in combination with
            pageKey to change the number of results in between page requests.
          required: false
          schema:
            type: integer
            format: int32
        - name: pageKey
          in: query
          description: >-
            Base64 encoded form of pagination query parameters. Do not try to
            construct or change programmatically as the internal structure may
            change without notice.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: >-
            The possible filter values to be used when fetching metrics or
            records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFilterValuesOutput'
              example:
                data:
                  - value: CALLBACK
                    label: Callback
                  - value: CONTACT_FORM
                    label: Contact Form
        '400':
          description: >-
            Invalid value extracted from request context, Invalid value for:
            query parameter pageLimit, Invalid value for: query parameter
            pageKey
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
              example:
                message: Invalid value in request
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
              example:
                message: >-
                  There was an internal server error while processing the
                  request
  /beta/analytics/records:
    get:
      tags:
        - Analytics
      summary: Metric Records Catalogue
      description: >-
        This endpoint lists all available record IDs that can be used to fetch
        data in Get Metric Records Data
      operationId: getAnalyticsRecords
      parameters:
        - name: pageLimit
          in: query
          description: >-
            Maximum number of results per page. May be used in combination with
            pageKey to change the number of results in between page requests.
          required: false
          schema:
            type: integer
            format: int32
        - name: pageKey
          in: query
          description: >-
            Base64 encoded form of pagination query parameters. Do not try to
            construct or change programmatically as the internal structure may
            change without notice.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: The catalogue of metric records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMetricRecordsOutput'
              example:
                data:
                  - id: ratings
                    description: Conversation Ratings
                    filters:
                      - filterAttribute: agent_id
                        description: Used to filter by the agent_id
                      - filterAttribute: queue_id
                        description: Used to filter by the queue_id
                      - filterAttribute: channel
                        description: Used to filter by the channel
                      - filterAttribute: initial_direction
                        description: Used to filter by the initial_direction
                      - filterAttribute: tag_id
                        description: Used to filter by the tag_id
                      - filterAttribute: contact_point
                        description: Used to filter by the contact_point
                    relatedMetricIds:
                      - csat
                    fieldsMetadata:
                      - field: conversation_id
                        description: Conversation ID
                        nullable: false
                      - field: agent_id
                        description: The agent assigned to the conversation
                        nullable: true
                      - field: queue_id
                        description: >-
                          The queue which the conversation was part of when the
                          conversation was offered
                        nullable: true
                  - id: closed_conversations
                    description: Closed conversation data
                    filters:
                      - filterAttribute: queue_id
                        description: Used to filter by the queue_id
                      - filterAttribute: channel
                        description: Used to filter by the channel
                      - filterAttribute: initial_direction
                        description: Used to filter by the initial_direction
                      - filterAttribute: tag_id
                        description: Used to filter by the tag_id
                      - filterAttribute: contact_point
                        description: Used to filter by the contact_point
                    relatedMetricIds:
                      - closed_conversations
                    fieldsMetadata:
                      - field: closed_at
                        description: Timestamp of when the conversation was closed
                        nullable: false
                      - field: conversation_id
                        description: Conversation ID
                        nullable: false
                      - field: agent_id
                        description: The agent closing the conversation
                        nullable: true
                      - field: queue_id
                        description: >-
                          The queue which the conversation was part of when the
                          conversation was closed
                        nullable: true
                      - field: closed_by
                        description: >-
                          User closing the conversation (Agent, Enduser or
                          Unknown)
                        nullable: false
        '400':
          description: >-
            Invalid value extracted from request context, Invalid value for:
            query parameter pageLimit, Invalid value for: query parameter
            pageKey
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
              example:
                message: Invalid value in request
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
              example:
                message: >-
                  There was an internal server error while processing the
                  request
    post:
      tags:
        - Analytics
      summary: Get Metric Records Data
      description: Get data of specific metric records (unaggregated)
      operationId: postAnalyticsRecords
      parameters:
        - name: pageLimit
          in: query
          description: >-
            Maximum number of results per page. May be used in combination with
            pageKey to change the number of results in between page requests.
          required: false
          schema:
            type: integer
            format: int32
        - name: pageKey
          in: query
          description: >-
            Base64 encoded form of pagination query parameters. Do not try to
            construct or change programmatically as the internal structure may
            change without notice.
          required: false
          schema:
            type: string
      requestBody:
        description: The available request filters for fetching the metric records data
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetMetricRecordsDataInput'
            examples:
              Example0:
                value:
                  id: closed_conversations
                  periodFilter:
                    value:
                      _type: PreviousWeek
                    _type: Preset
                  filters:
                    - attribute: initial_direction
                      values:
                        - INBOUND
                  timezone: Europe/Copenhagen
              Example1:
                value:
                  id: closed_conversations
                  csidFilter:
                    - 42
                    - 43
                    - 44
                  filters:
                    - attribute: initial_direction
                      values:
                        - INBOUND
                  timezone: Europe/Copenhagen
        required: true
      responses:
        '200':
          description: The metric records data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMetricRecordsDataOutput'
              examples:
                No Value Metric Records Data Example:
                  value:
                    data:
                      - primaryTimestampField:
                          name: created_at
                          timestamp: '2023-04-21T10:23:14.293Z'
                        fields:
                          - name: csid
                            field:
                              value: 184472
                              _type: LongField
                          - name: initial_direction
                            field:
                              value: INBOUND
                              label: Inbound
                              _type: StringField
                          - name: initial_channel
                            field:
                              value: PSTN_PHONE
                              label: Phone
                              _type: StringField
                          - name: contact_point
                            field:
                              value: '+4511223344'
                              label: '+4511223344'
                              _type: StringField
                      - primaryTimestampField:
                          name: created_at
                          timestamp: '2023-04-21T10:24:04.259Z'
                        fields:
                          - name: csid
                            field:
                              value: 184473
                              _type: LongField
                          - name: initial_direction
                            field:
                              value: INBOUND
                              label: Inbound
                              _type: StringField
                          - name: initial_channel
                            field:
                              value: EMAIL
                              label: Email
                              _type: StringField
                          - name: contact_point
                            field:
                              value: dixa@email.com
                              label: dixa@email.com
                              _type: StringField
                Metric Records Data Example:
                  value:
                    data:
                      - primaryTimestampField:
                          name: created_at
                          timestamp: '2023-04-21T10:23:01.293Z'
                        value:
                          value: 4
                          _type: LongField
                        fields:
                          - name: csid
                            field:
                              value: 184474
                              _type: LongField
                          - name: current_channel
                            field:
                              value: EMAIL
                              label: Email
                              _type: StringField
                          - name: queue
                            field:
                              value: 220ffe6a-3040-4ece-ae3a-c4c6d63ff3cc
                              label: Example queue
                              _type: UUIDField
                      - primaryTimestampField:
                          name: created_at
                          timestamp: '2023-04-21T10:23:04.930Z'
                        value:
                          value: 5
                          _type: LongField
                        fields:
                          - name: csid
                            field:
                              value: 184475
                              _type: LongField
                          - name: current_channel
                            field:
                              value: CONTACT_FORM
                              label: Contact form
                              _type: StringField
                          - name: queue
                            field:
                              value: 57582f31-4fce-4435-b489-e1c7f190a92f
                              label: Example queue 2
                              _type: UUIDField
        '400':
          description: >-
            Invalid value extracted from request context, Invalid value for:
            query parameter pageLimit, Invalid value for: query parameter
            pageKey, Invalid value for: body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
              example:
                message: Invalid value in request
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
              example:
                message: >-
                  There was an internal server error while processing the
                  request
  /beta/analytics/records/{recordId}:
