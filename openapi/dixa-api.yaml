    post:
      tags:
        - Conversations
        - Messages
      summary: Add message
      description: >-
        Add a message to a conversation. For inbound messages the author is
        assumed to be the requester of the conversation (end user). For outbound
        messages the author is specified using the agentId field. <br>If
        attachments are added to the message, they will be copied and stored in
        Dixa. <br> Content in outbound message is required except for Whatsapp
        messages. <br> Supported channels are Chat, Messenger, Contact Form,
        Email, Sms (outbound only), Whatsapp (outbound and Markdown only).
        <br><br> Supported Markdown syntax for Markdown content: bold
        <code>\*\*text\*\*</code>, italic <code>\*text\*</code>, bold & italic
        <code>\*\*\*text\*\*\*</code>, strikethrough <code>\~text\~</code>,
        blockquote <code> \> Quoted text. \n Message about quoted text</code>,
        ordered list <code>List:\n1. Item\n2. Item\n3. Item</code>, unordered
        list <code>List:\n\* Item\n\* Item\n\* Item</code>, inline code
        <code>This is \`code\`</code>. <br><br> Whatsapp channel: <br> Only one
        attachment is allowed per WhatsApp message. <br> Supports adding a
        message with attachment only (no content). <br> Supports the following
        file types for attachments: .jpg, .jpeg, .png, .pdf, .doc, .docx, .pptx,
        .xlsx
      operationId: postConversationsConversationidMessages
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: The message to be added to a conversation
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageInput'
            examples:
              General inbound example:
                summary: General inbound example
                value:
                  content:
                    value: I need some help!
                    _type: Html
                  attachments:
                    - url: http://attachment.url
                      prettyName: Filename
                  _type: Inbound
              General outbound example:
                summary: General outbound example
                value:
                  content:
                    value: Ok, I can help you!
                    _type: Text
                  agentId: bac5a02c-15b3-44da-ae1e-ab7b9db4aa89
                  attachments:
                    - url: http://attachment.url
                      prettyName: Filename
                  cc: []
                  bcc: []
                  _type: Outbound
              Whatsapp outbound:
                summary: Whatsapp outbound
                value:
                  content:
                    value: >-
                      Hello dear **customer**! Here are *your* options:\n* New
                      item\n* Refund\n* Restock
                    _type: Markdown
                  agentId: 359ef707-d77f-4298-a101-43da2d0c5770
                  attachments: []
                  cc: []
                  bcc: []
                  _type: Outbound
              Whatsapp outbound with attachments:
                summary: Whatsapp outbound with attachments
                value:
                  content:
                    value: >-
                      Hello dear **customer**! Here are *your* options:\n* New
                      item\n* Refund\n* Restock
                    _type: Markdown
                  agentId: 359ef707-d77f-4298-a101-43da2d0c5770
                  attachments:
                    - url: https://file.hosting.service/file1234.jpg
                  cc: []
                  bcc: []
                  _type: Outbound
        required: true
      responses:
